name: Sync Non-Pokemon Game Sets (Manual)

on:
  workflow_dispatch:
    inputs:
      game:
        description: 'Which game to sync'
        required: true
        type: choice
        options:
          - magic
          - yugioh
          - one-piece
      set_name:
        description: 'Target a specific set by name (optional, e.g. "Stardust Overdrive")'
        required: false
        default: ''
      min_cards:
        description: 'Retry sets with fewer than this many cards (default: 10)'
        required: false
        default: '10'
      dry_run:
        description: 'Preview discovered sets without writing to DB'
        required: false
        type: boolean
        default: false

jobs:
  sync-sets:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Sync Sets from PriceCharting
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: |
        ARGS="--game ${{ github.event.inputs.game }}"
        if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
          ARGS="$ARGS --dry-run"
        fi
        python -u sync_all_sets.py $ARGS

    - name: Backfill Cards for New Sets
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: |
        # Skip backfill when dry_run is true
        if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
          echo "Dry run — skipping backfill"
          exit 0
        fi

        if [ -n "${{ github.event.inputs.set_name }}" ]; then
          python -u backfill_new_sets.py \
            --game ${{ github.event.inputs.game }} \
            --set-name "${{ github.event.inputs.set_name }}"
        else
          python -u backfill_new_sets.py \
            --game ${{ github.event.inputs.game }} \
            --min-cards ${{ github.event.inputs.min_cards || '10' }}
        fi
