name: Sync New Pokemon Sets

on:
  schedule:
    # Run weekly on Sundays at 1 AM UTC (before the main scraper)
    - cron: '0 1 * * 0'
  workflow_dispatch:
    inputs:
      set_name:
        description: 'Target a specific set by name (optional, e.g. "Ascended Heroes")'
        required: false
        default: ''
      min_cards:
        description: 'Retry sets with fewer than this many cards (default: 10)'
        required: false
        default: '10'

jobs:
  sync-sets:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Sync All Pokemon Sets
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: |
        python -u sync_all_sets.py

    - name: Backfill Cards for New Sets
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: |
        if [ -n "${{ github.event.inputs.set_name }}" ]; then
          python -u backfill_new_sets.py --set-name "${{ github.event.inputs.set_name }}"
        else
          python -u backfill_new_sets.py --min-cards ${{ github.event.inputs.min_cards || '10' }}
        fi