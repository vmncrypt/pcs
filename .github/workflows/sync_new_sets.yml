name: Sync New Sets (All Games)

on:
  schedule:
    # Run weekly on Sundays at 1 AM UTC (before the main scraper)
    - cron: '0 1 * * 0'
  workflow_dispatch:
    inputs:
      set_name:
        description: 'Target a specific set by name (optional, e.g. "Ascended Heroes")'
        required: false
        default: ''
      min_cards:
        description: 'Retry sets with fewer than this many cards (default: 10)'
        required: false
        default: '10'

jobs:
  sync-sets:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours — initial MTG/YGO backfill can have thousands of cards
    strategy:
      matrix:
        game: [pokemon, magic, yugioh, one-piece]
      fail-fast: false  # Don't cancel other games if one fails

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Sync Sets from PriceCharting
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: |
        python -u sync_all_sets.py --game ${{ matrix.game }}

    - name: Backfill Cards for New Sets
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: |
        if [ -n "${{ github.event.inputs.set_name }}" ]; then
          python -u backfill_new_sets.py \
            --game ${{ matrix.game }} \
            --set-name "${{ github.event.inputs.set_name }}"
        else
          python -u backfill_new_sets.py \
            --game ${{ matrix.game }} \
            --min-cards ${{ github.event.inputs.min_cards || '10' }}
        fi
