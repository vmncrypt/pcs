name: Backfill PSA Population Data

on:
  workflow_dispatch:
    inputs:
      delay:
        description: 'Delay between requests in seconds'
        required: false
        default: '1.0'

jobs:
  backfill-pop:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run PSA pop backfill
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: |
        python -u backfill_psa_pop.py --delay ${{ github.event.inputs.delay || '1.0' }}
