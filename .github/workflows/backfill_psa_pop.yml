name: Backfill PSA Population Data

on:
  workflow_dispatch:
    inputs:
      delay:
        description: 'Delay between requests in seconds'
        required: false
        default: '1.0'

jobs:
  backfill-1:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    - run: pip install -r requirements.txt
    - name: Run batch 1 (0–2249)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: python -u backfill_psa_pop.py --offset 0 --max 2250 --delay ${{ github.event.inputs.delay || '1.0' }}

  backfill-2:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    - run: pip install -r requirements.txt
    - name: Run batch 2 (2250–4499)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: python -u backfill_psa_pop.py --offset 2250 --max 2250 --delay ${{ github.event.inputs.delay || '1.0' }}

  backfill-3:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    - run: pip install -r requirements.txt
    - name: Run batch 3 (4500–6749)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: python -u backfill_psa_pop.py --offset 4500 --max 2250 --delay ${{ github.event.inputs.delay || '1.0' }}

  backfill-4:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    - run: pip install -r requirements.txt
    - name: Run batch 4 (6750–8999)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: python -u backfill_psa_pop.py --offset 6750 --max 2250 --delay ${{ github.event.inputs.delay || '1.0' }}
