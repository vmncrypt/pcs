name: Scrape PriceCharting Grade Data

on:
  schedule:
    # Run every 5 days at 2 AM UTC
    - cron: '0 2 */5 * *'
  workflow_dispatch:
    inputs:
      game:
        description: 'Only scrape this game (leave empty to scrape all games)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - pokemon
          - magic
          - yugioh
          - one-piece

jobs:
  # Job 1: Sync eligible products (only runs once at start)
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Sync eligible products
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: |
        if [ -n "${{ github.event.inputs.game }}" ]; then
          python -u sync_eligible_products.py --game ${{ github.event.inputs.game }}
        else
          python -u sync_eligible_products.py
        fi

  # Job 2: Scrape batch 1 (runs after sync)
  scrape-batch-1:
    needs: sync
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5 hours 50 minutes

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run scraper batch 1
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONUNBUFFERED: 1
      run: |
        # Run for ~3.8 hours with 2 second delay between requests
        timeout 19800s python -u process_db.py --batch-size 100 --delay 2.0 || true
